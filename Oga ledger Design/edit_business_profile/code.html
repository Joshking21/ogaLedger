            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

<body class="bg-background font-body text-on-surface antialiased">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#f9f9fc]/85 dark:bg-[#1a1c1e]/85 backdrop-blur-md flex justify-between items-center px-6 h-16 w-full">
<div class="flex items-center gap-4">
<button class="flex items-center justify-center w-10 h-10 hover:bg-[#00a86b]/10 transition-colors active:scale-95 duration-150 rounded-full">
<span class="material-symbols-outlined text-[#1a1c1e] dark:text-[#e2e2e5]" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-['Plus_Jakarta_Sans'] font-bold text-xl text-[#1a1c1e] dark:text-[#e2e2e5]">Edit Profile</h1>
</div>
<button class="px-6 py-2 rounded-xl text-[#006d43] font-bold hover:bg-[#00a86b]/10 transition-colors active:scale-95 duration-150">
            Save
        </button>
</header>
<!-- Main Content Canvas -->
<main class="pt-24 pb-32 px-6 max-w-2xl mx-auto">
<!-- Business Logo / Avatar Section (Bento Inspired) -->
<section class="mb-12">
<div class="flex flex-col items-center">
<div class="relative group">
<div class="w-32 h-32 rounded-full overflow-hidden bg-surface-container-high ring-4 ring-primary/10 shadow-[0_8px_24px_rgba(0,82,50,0.06)]">
<img class="w-full h-full object-cover" data-alt="professional logo of a modern Nigerian retail business with clean geometric shapes and vibrant green accents" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCOKCBKKGl6KY2twZa30U7k3mPqk3v4B16ADWnqwSV8K20ejgbZKstwVKPOCZpcr8O4dd4vMqhAZz-HvIJD4bdnvSO5zQlQ4Ovaj-3EdJcQsITUfCsLL98MGn6x7WirTClvOZr8zQKvZcV71X0-r4_9j_4JEV5RB9JIurNvgIk9ueQgp9L-1AWBw3cv50YUnS1v2VaqIm0plObqpirt7wtY1pcNdtdm37dgN6ZN-lM_G_OuiMay1B9DaJbQq5-13EsIOh6J6x1OAhI"/>
</div>
<button class="absolute bottom-0 right-0 w-10 h-10 bg-primary text-on-primary rounded-full flex items-center justify-center shadow-lg active:scale-90 transition-transform">
<span class="material-symbols-outlined text-sm" data-icon="photo_camera">photo_camera</span>
</button>
</div>
<div class="mt-4 text-center">
<p class="font-headline font-bold text-lg text-on-surface">Oga Ledger Retail</p>
<p class="text-on-surface-variant text-sm font-medium">Update your business identity</p>
</div>
</div>
</section>
<!-- Form Section -->
<div class="space-y-8">
<!-- Business Name Input -->
<div class="relative group">
<div class="bg-surface-container-high rounded-t-xl px-4 pt-6 pb-2 border-b-2 border-transparent group-focus-within:border-primary transition-all duration-300">
<label class="absolute left-4 top-2 text-[10px] uppercase tracking-wider font-bold text-on-surface-variant group-focus-within:text-primary transition-colors" for="business_name">Business Name</label>
<input class="w-full bg-transparent border-none p-0 text-on-surface font-headline font-bold text-lg focus:ring-0 placeholder-on-surface-variant/30" id="business_name" type="text" value="Oga Ledger Retail"/>
</div>
<p class="mt-2 text-xs text-on-surface-variant/60 font-medium ml-1">Use the legal name registered with the CAC.</p>
</div>
<!-- Business Category Dropdown -->
<div class="relative group">
<div class="bg-surface-container-high rounded-t-xl px-4 pt-6 pb-2 border-b-2 border-transparent group-focus-within:border-primary transition-all duration-300">
<label class="absolute left-4 top-2 text-[10px] uppercase tracking-wider font-bold text-on-surface-variant group-focus-within:text-primary transition-colors" for="business_category">Business Category</label>
<div class="flex items-center">
<select class="w-full bg-transparent border-none p-0 text-on-surface font-headline font-bold text-lg focus:ring-0 appearance-none" id="business_category">
<option selected="" value="retail">General Retail &amp; Wholesale</option>
<option value="logistics">Logistics &amp; Transport</option>
<option value="hospitality">Hospitality &amp; Food</option>
<option value="tech">Professional Services</option>
</select>
<span class="material-symbols-outlined text-on-surface-variant pointer-events-none" data-icon="expand_more">expand_more</span>
</div>
</div>
</div>
<!-- Phone Number Input -->
<div class="relative group">
<div class="bg-surface-container-high rounded-t-xl px-4 pt-6 pb-2 border-b-2 border-transparent group-focus-within:border-primary transition-all duration-300">
<label class="absolute left-4 top-2 text-[10px] uppercase tracking-wider font-bold text-on-surface-variant group-focus-within:text-primary transition-colors" for="phone_number">Phone Number</label>
<div class="flex items-center gap-2">
<span class="font-headline font-bold text-lg text-on-surface-variant">+234</span>
<input class="w-full bg-transparent border-none p-0 text-on-surface font-headline font-bold text-lg focus:ring-0 placeholder-on-surface-variant/30" id="phone_number" type="tel" value="803 123 4567"/>
</div>
</div>
</div>
<!-- Business Address Input -->
<div class="relative group">
<div class="bg-surface-container-high rounded-t-xl px-4 pt-6 pb-2 border-b-2 border-transparent group-focus-within:border-primary transition-all duration-300">
<label class="absolute left-4 top-2 text-[10px] uppercase tracking-wider font-bold text-on-surface-variant group-focus-within:text-primary transition-colors" for="business_address">Business Address</label>
<textarea class="w-full bg-transparent border-none p-0 text-on-surface font-body font-medium text-lg focus:ring-0 placeholder-on-surface-variant/30 resize-none" id="business_address" rows="3">12, Victoria Island Crescent, Lagos State, Nigeria.</textarea>
</div>
</div>
</div>
<!-- Danger Zone Tonal Shift Section -->
<section class="mt-16 bg-surface-container-low p-6 rounded-2xl">
<h2 class="font-headline font-bold text-tertiary mb-4">Account Control</h2>
<div class="flex flex-col gap-4">
<button class="flex items-center justify-between w-full p-4 bg-surface-container-lowest rounded-xl hover:opacity-80 transition-opacity">
<span class="font-body font-semibold text-on-surface">Change Password</span>
<span class="material-symbols-outlined text-on-surface-variant" data-icon="chevron_right">chevron_right</span>
</button>
<button class="flex items-center justify-between w-full p-4 bg-surface-container-lowest rounded-xl hover:opacity-80 transition-opacity">
<span class="font-body font-semibold text-tertiary">Delete Ledger Data</span>
<span class="material-symbols-outlined text-tertiary" data-icon="delete">delete</span>
</button>
</div>
</section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center h-20 pb-safe px-4 bg-[#f9f9fc]/85 dark:bg-[#1a1c1e]/85 backdrop-blur-md z-50 rounded-t-xl border-t border-[#bccabe]/15 shadow-[0_-8px_24px_rgba(0,82,50,0.06)]">
<a class="flex flex-col items-center justify-center text-[#5c5f62] dark:text-[#c4c7ca] px-4 py-1 hover:opacity-80 transition-opacity active:scale-95 duration-200" href="#">
<span class="material-symbols-outlined" data-icon="account_balance_wallet">account_balance_wallet</span>
<span class="font-['Inter'] text-[12px] font-medium">Ledger</span>
</a>
<a class="flex flex-col items-center justify-center text-[#5c5f62] dark:text-[#c4c7ca] px-4 py-1 hover:opacity-80 transition-opacity active:scale-95 duration-200" href="#">
<span class="material-symbols-outlined" data-icon="inventory_2">inventory_2</span>
<span class="font-['Inter'] text-[12px] font-medium">Inventory</span>
</a>
<a class="flex flex-col items-center justify-center text-[#5c5f62] dark:text-[#c4c7ca] px-4 py-1 hover:opacity-80 transition-opacity active:scale-95 duration-200" href="#">
<span class="material-symbols-outlined" data-icon="groups">groups</span>
<span class="font-['Inter'] text-[12px] font-medium">Customers</span>
</a>
<a class="flex flex-col items-center justify-center bg-[#00a86b]/10 text-[#006d43] dark:text-[#00a86b] rounded-2xl px-4 py-1 hover:opacity-80 transition-opacity active:scale-95 duration-200" href="#">
<span class="material-symbols-outlined" data-icon="storefront" style="font-variation-settings: 'FILL' 1;">storefront</span>
<span class="font-['Inter'] text-[12px] font-medium">Profile</span>
</a>
</nav>
</body></html>
