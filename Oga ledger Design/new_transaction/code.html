<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sovereign Ledger - New Transaction</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "secondary-fixed-dim": "#a0d2b2",
                    "inverse-surface": "#2f3133",
                    "tertiary-container": "#e86c6e",
                    "tertiary-fixed": "#ffdad8",
                    "surface-container-lowest": "#ffffff",
                    "inverse-on-surface": "#f0f0f3",
                    "surface-container-high": "#e8e8ea",
                    "surface-dim": "#dadadc",
                    "on-primary-fixed": "#002111",
                    "outline": "#6d7a70",
                    "on-tertiary-fixed": "#410008",
                    "on-secondary": "#ffffff",
                    "on-secondary-container": "#3e6c51",
                    "on-surface": "#1a1c1e",
                    "primary-fixed": "#78fbb6",
                    "on-secondary-fixed-variant": "#214f37",
                    "surface-container": "#eeeef0",
                    "inverse-primary": "#59de9b",
                    "background": "#f9f9fc",
                    "error": "#ba1a1a",
                    "surface-container-highest": "#e2e2e5",
                    "primary-container": "#00a86b",
                    "on-secondary-fixed": "#002111",
                    "on-error": "#ffffff",
                    "primary-fixed-dim": "#59de9b",
                    "surface-container-low": "#f3f3f6",
                    "surface-variant": "#e2e2e5",
                    "on-primary-container": "#00331d",
                    "on-surface-variant": "#3d4a41",
                    "secondary": "#3a684d",
                    "primary": "#006d43",
                    "tertiary-fixed-dim": "#ffb3b1",
                    "on-background": "#1a1c1e",
                    "on-primary-fixed-variant": "#005232",
                    "surface": "#f9f9fc",
                    "error-container": "#ffdad6",
                    "on-primary": "#ffffff",
                    "outline-variant": "#bccabe",
                    "surface-bright": "#f9f9fc",
                    "tertiary": "#a5393e",
                    "on-tertiary": "#ffffff",
                    "on-tertiary-container": "#5e0211",
                    "on-error-container": "#93000a",
                    "secondary-fixed": "#bceecd",
                    "surface-tint": "#006d43",
                    "secondary-container": "#b9ebca",
                    "on-tertiary-fixed-variant": "#852229"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "fontFamily": {
                    "headline": ["Plus Jakarta Sans"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        }
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .tonal-shift-bg {
            background-color: #f9f9fc;
        }
        .tap-highlight-transparent {
            -webkit-tap-highlight-color: transparent;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body min-h-screen">
<!-- Top AppBar (Task-Focused: Suppression Check - "Close" button implies temporary departure) -->
<header class="fixed top-0 w-full z-50 bg-slate-50/85 backdrop-blur-md flex justify-between items-center px-6 h-16 w-full max-w-full">
<div class="flex items-center gap-3">
<button class="p-2 -ml-2 hover:bg-slate-100 transition-colors rounded-full active:scale-95 duration-150">
<span class="material-symbols-outlined text-on-surface-variant">close</span>
</button>
<h1 class="font-headline font-bold text-lg text-emerald-700">New Transaction</h1>
</div>
<div class="flex items-center gap-2">
<span class="text-label-sm text-slate-500 font-medium">Draft saved</span>
<div class="w-2 h-2 rounded-full bg-emerald-500"></div>
</div>
</header>
<main class="pt-24 pb-32 px-6 max-w-2xl mx-auto">
<!-- Main Form Container -->
<div class="flex flex-col gap-10">
<!-- Amount Entry: Hero Typography -->
<section class="flex flex-col items-center justify-center text-center py-4">
<label class="font-label text-slate-500 text-sm mb-2 font-medium">Amount Received</label>
<div class="flex items-baseline justify-center gap-2">
<span class="font-headline font-extrabold text-4xl text-primary">₦</span>
<input autofocus="" class="w-full bg-transparent border-none focus:ring-0 text-center font-headline font-bold text-6xl text-on-surface placeholder:text-surface-variant p-0 overflow-visible" placeholder="0.00" type="text"/>
</div>
</section>
<!-- Transaction Type: Segmented Control -->
<section class="bg-surface-container-low p-1.5 rounded-2xl flex gap-1">
<button class="flex-1 py-3 px-4 rounded-xl bg-surface-container-lowest text-primary font-bold shadow-sm transition-all text-sm flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[20px]" data-icon="payments">payments</span>
                    Cash Sale
                </button>
<button class="flex-1 py-3 px-4 rounded-xl text-slate-500 font-semibold hover:bg-slate-100 transition-all text-sm flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[20px]" data-icon="group">group</span>
                    Debt
                </button>
</section>
<!-- Form Details -->
<div class="space-y-8">
<!-- Field Group: Customer -->
<div class="space-y-2">
<label class="font-label text-xs font-bold text-slate-500 uppercase tracking-widest pl-1">Who is this for?</label>
<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-slate-400 group-focus-within:text-primary transition-colors">person</span>
</div>
<input class="w-full h-14 pl-12 pr-4 bg-surface-container-high border-none rounded-xl focus:ring-0 border-b-2 border-transparent focus:border-primary transition-all text-on-surface font-medium placeholder:text-slate-400" placeholder="Customer Name (Optional)" type="text"/>
</div>
</div>
<!-- Field Group: Description -->
<div class="space-y-2">
<label class="font-label text-xs font-bold text-slate-500 uppercase tracking-widest pl-1">What was it for?</label>
<div class="relative group">
<div class="absolute top-4 left-4 flex items-start pointer-events-none">
<span class="material-symbols-outlined text-slate-400 group-focus-within:text-primary transition-colors">notes</span>
</div>
<textarea class="w-full pl-12 pr-4 pt-4 bg-surface-container-high border-none rounded-xl focus:ring-0 border-b-2 border-transparent focus:border-primary transition-all text-on-surface font-medium placeholder:text-slate-400 resize-none" placeholder="Description of goods or services" rows="3"></textarea>
</div>
</div>
<!-- Date Selection (Optional Subtle Row) -->
<div class="flex items-center justify-between py-2 px-1">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center text-slate-500">
<span class="material-symbols-outlined text-[20px]">calendar_today</span>
</div>
<div>
<p class="text-xs text-slate-500 font-medium">Transaction Date</p>
<p class="text-sm font-semibold text-on-surface">Today, Oct 24, 2023</p>
</div>
</div>
<button class="text-primary font-bold text-sm">Change</button>
</div>
</div>
<!-- Media/Receipt Attachment -->
<button class="w-full flex items-center justify-center gap-3 py-6 border-2 border-dashed border-slate-200 rounded-2xl text-slate-500 hover:border-emerald-200 hover:bg-emerald-50/30 transition-all group">
<span class="material-symbols-outlined text-slate-400 group-hover:text-primary">add_a_photo</span>
<span class="font-bold text-sm">Attach Receipt or Item Photo</span>
</button>
</div>
</main>
<!-- Fixed Action Bar -->
<div class="fixed bottom-0 w-full p-6 bg-surface/80 backdrop-blur-lg z-50">
<div class="max-w-2xl mx-auto">
<button class="w-full h-16 rounded-2xl bg-gradient-to-tl from-primary to-primary-container text-white font-headline font-bold text-lg shadow-[0_8px_24px_rgba(0,82,50,0.2)] active:scale-[0.98] transition-transform flex items-center justify-center gap-3">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">check_circle</span>
                Save Transaction
            </button>
</div>
</div>
<!-- Background Decorative Elements (The Digital Veranda soul) -->
<div class="fixed top-0 left-0 w-full h-full -z-10 overflow-hidden pointer-events-none opacity-40">
<div class="absolute -top-[10%] -right-[5%] w-[400px] h-[400px] bg-emerald-100/50 rounded-full blur-[100px]"></div>
<div class="absolute top-[60%] -left-[10%] w-[300px] h-[300px] bg-slate-200/50 rounded-full blur-[80px]"></div>
</div>
</body></html>
